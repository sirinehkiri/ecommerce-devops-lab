name: Full DevOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  terraform:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    outputs:
      instance_ips: ${{ steps.export.outputs.instance_ips }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Export Instance IPs
        id: export
        run: |
          IPS=$(terraform output -raw instance_public_ip)
          echo "instance_ips=$IPS" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup SSH Key
        run: |
          echo "${{ secrets.EC2_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Attendre que l'instance soit prête
        run: sleep 60

      - name: Deploy via SSH
        run: |
          IP="${{ needs.terraform.outputs.instance_ips }}"

          # Copier les fichiers sur le serveur
          scp -i key.pem -o StrictHostKeyChecking=no \
            app/docker-compose.yml ec2-user@$IP:~/docker-compose.yml

          scp -i key.pem -o StrictHostKeyChecking=no \
            app/backend/index.js ec2-user@$IP:~/index.js

          scp -i key.pem -o StrictHostKeyChecking=no \
            app/backend/package.json ec2-user@$IP:~/package.json

          scp -i key.pem -o StrictHostKeyChecking=no \
            app/nginx/default.conf ec2-user@$IP:~/default.conf

          # Installer Docker et lancer les conteneurs
          ssh -i key.pem -o StrictHostKeyChecking=no ec2-user@$IP << 'ENDSSH'
            # Installer Docker
            sudo yum install -y docker
            sudo systemctl start docker
            sudo systemctl enable docker
            sudo usermod -aG docker ec2-user

            # Installer Docker Compose
            sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64" \
              -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose

            # Préparer les dossiers
            mkdir -p ~/app/nginx ~/app/backend

            # Copier les fichiers
            mv ~/docker-compose.yml ~/app/
            mv ~/index.js ~/app/backend/
            mv ~/package.json ~/app/backend/
            mv ~/default.conf ~/app/nginx/

            # Lancer les conteneurs
            cd ~/app
            sudo /usr/local/bin/docker-compose down || true
            sudo /usr/local/bin/docker-compose up -d
          ENDSSH
