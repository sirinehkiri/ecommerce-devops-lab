version: '3'
services:
  mongodb:
    image: mongo:latest
    restart: always

  app:
    image: node:18
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm install && node server.js"
    ports:
      - "3000:3000"
    depends_on:
      - mongodb

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    depends_on:
      - app
