version: '3'
services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - nodeapp
  mongo:
    image: mongo
    ports:
      - "27017:27017"
  nodeapp:
    image: node:18
    working_dir: /app
    command: bash -c "npm install && npm start"
    volumes:
      - ./backend:/app
    ports:
      - "3000:3000"
